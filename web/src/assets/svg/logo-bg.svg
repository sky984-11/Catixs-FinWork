<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#0A369D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34D399;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Logo Mark -->
  <g transform="translate(50, 50) scale(0.6)">
    <!-- Circular Arrows -->
    <path d="M256 40 C 350 40, 440 120, 440 256 L 470 256 L 420 310 L 370 256 L 400 256 C 400 160, 340 80, 256 80 L 256 40 Z" fill="url(#blueGrad)" />
    <path d="M256 472 C 162 472, 72 392, 72 256 L 42 256 L 92 202 L 142 256 L 112 256 C 112 352, 172 432, 256 432 L 256 472 Z" fill="url(#greenGrad)" />

    <!-- Document Icon -->
    <g transform="translate(130, 160) scale(0.8)">
      <rect x="0" y="0" width="140" height="180" rx="15" fill="url(#blueGrad)" />
      <rect x="30" y="40" width="80" height="12" rx="6" fill="#FFFFFF" />
      <rect x="30" y="75" width="80" height="12" rx="6" fill="#FFFFFF" />
      <rect x="30" y="110" width="50" height="12" rx="6" fill="#FFFFFF" />
      <circle cx="120" cy="160" r="35" fill="url(#blueGrad)" stroke="#FFFFFF" stroke-width="8" />
      <path d="M105 160 L 115 170 L 135 150" stroke="#FFFFFF" stroke-width="12" fill="none" stroke-linecap="round" stroke-linejoin="round" />
    </g>

    <!-- Bar Chart Icon -->
    <g transform="translate(280, 200) scale(0.8)">
      <rect x="0" y="80" width="35" height="60" rx="8" fill="url(#greenGrad)" />
      <rect x="55" y="40" width="35" height="100" rx="8" fill="url(#greenGrad)" />
      <rect x="110" y="0" width="35" height="140" rx="8" fill="url(#greenGrad)" />
    </g>
  </g>

  <!-- Text -->
  <g transform="translate(420, 250)">
    <text font-family="Arial, sans-serif" font-weight="bold" font-size="160" fill="#0A369D">Catixs <tspan fill="#10B981">FinWork</tspan></text>
    <text font-family="Arial, sans-serif" font-size="60" fill="#666" x="200" y="80" letter-spacing="15">财工一体化管理平台</text>
  </g>
</svg>
