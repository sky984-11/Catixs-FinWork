[phases.setup]
nixPkgs = ["python313", "uv", "nodejs_20", "pnpm", "gcc"]

[phases.install]
cmds = [
  "python --version",
  "uv sync --no-dev --no-install-project --default-index https://mirrors.aliyun.com/pypi/simple/ --allow-insecure-host mirrors.aliyun.com",
  "cd web && pnpm install --frozen-lockfile"
]

[phases.build]
cmds = [
  "cd web && pnpm run build",
  "rm -rf web/node_modules web/.pnpm-store web/stats.html",
  "mkdir -p migrations uploads/avatars uploads/bills uploads/tickets app/logs"
]

[start]
cmd = "UVICORN_RELOAD=false uv run python run.py"
