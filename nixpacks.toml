[phases.setup]
nixPkgs = ["python313", "python313Packages.pip", "nodejs_20", "pnpm", "gcc"]

[phases.install]
cmds = [
  "python --version",
  "python -m pip install --no-cache-dir -r requirements.txt --index-url https://mirrors.aliyun.com/pypi/simple/ --trusted-host mirrors.aliyun.com",
  "cd web && pnpm install --frozen-lockfile"
]

[phases.build]
cmds = [
  "cd web && pnpm run build",
  "mkdir -p migrations uploads/tickets app/logs"
]

[start]
cmd = "uvicorn app:app --host 0.0.0.0 --port ${PORT:-8000}"
